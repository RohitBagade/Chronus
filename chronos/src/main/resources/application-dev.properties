# Dev profile — zero infrastructure. Boots with H2 in-memory + Quartz RAM store.
# Run: ./mvnw spring-boot:run -Dspring-boot.run.profiles=dev   (or SPRING_PROFILES_ACTIVE=dev)

spring.datasource.url=jdbc:h2:mem:chronos;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Browse the in-memory DB at /h2-console (jdbc url: jdbc:h2:mem:chronos)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Quartz in RAM — no DB schema, no external store needed for dev
spring.quartz.job-store-type=memory
