# Prod profile — MySQL + Quartz JDBC store (durable, survives restarts, cluster-ready).
# All secrets injected via env. Activate with SPRING_PROFILES_ACTIVE=prod.

spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/chronos?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Quartz persistent JDBC store — job triggers survive restarts and can be shared across nodes.
spring.quartz.job-store-type=jdbc
spring.quartz.jdbc.initialize-schema=always
spring.quartz.properties.org.quartz.jobStore.driverDelegateClass=org.quartz.impl.jdbcjobstore.StdJDBCDelegate
