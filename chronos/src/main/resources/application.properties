spring.application.name=chronos

# Default to the zero-infra 'dev' profile; use SPRING_PROFILES_ACTIVE=prod in production.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# JWT + seed admin. Overridden by real env values in prod; safe defaults for local dev.
chronos.jwt.secret=${CHRONOS_JWT_SECRET:dev-only-chronos-secret-change-me-0123456789abcdef0123456789abcdef}
chronos.jwt.expiration-ms=${CHRONOS_JWT_EXP:86400000}
chronos.admin.email=${CHRONOS_ADMIN_EMAIL:admin@chronos.dev}
chronos.admin.password=${CHRONOS_ADMIN_PASSWORD:admin12345}

# File upload dir for job artifacts
chronos.upload.dir=${CHRONOS_UPLOAD_DIR:uploads}
